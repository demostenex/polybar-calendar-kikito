[module/date]
; mantenha seu modulo de data atual e adicione os cliques:
click-left = ~/.config/polybar/scripts/polybar-calendar-toggle.sh
click-middle = ~/.config/polybar/scripts/polybar-calendar-toggle.sh --toggle-list
click-right = ~/.config/polybar/scripts/.venv/bin/python ~/.config/polybar/scripts/google_agenda_polybar.py --mode popup --cache-ttl 1800

[module/google-calendar]
type = custom/script
exec = ~/.config/polybar/scripts/.venv/bin/python ~/.config/polybar/scripts/google_agenda_polybar.py --mode module --alert-minutes 10 --cache-ttl 1800
interval = 60
click-left = ~/.config/polybar/scripts/.venv/bin/python ~/.config/polybar/scripts/google_agenda_polybar.py --mode popup --cache-ttl 1800
